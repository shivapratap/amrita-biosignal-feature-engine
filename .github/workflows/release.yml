name: GitHub Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  dry-run:
    if: github.event_name == 'workflow_dispatch'
    name: Validate candidate artifacts (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip build
      - name: Read candidate package version
        run: |
          PROJECT_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test -n "$PROJECT_VERSION"
          echo "ABFE_EXPECTED_VERSION=$PROJECT_VERSION" >> "$GITHUB_ENV"
      - run: python -m build
      - run: python scripts/check_artifacts.py dist/*.whl dist/*.tar.gz
      - name: Wheel installed-package smoke test
        run: |
          python -m venv /tmp/abfe-release-wheel-smoke
          /tmp/abfe-release-wheel-smoke/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/abfe-release-wheel-smoke/bin/python "$GITHUB_WORKSPACE/scripts/smoke_installed.py" --expected-version "$ABFE_EXPECTED_VERSION"
      - name: Source-distribution installed-package smoke test
        run: |
          python -m venv /tmp/abfe-release-sdist-smoke
          /tmp/abfe-release-sdist-smoke/bin/python -m pip install "$GITHUB_WORKSPACE"/dist/*.tar.gz
          cd /tmp
          /tmp/abfe-release-sdist-smoke/bin/python "$GITHUB_WORKSPACE/scripts/smoke_installed.py" --expected-version "$ABFE_EXPECTED_VERSION"
      - name: Generate and verify artifact hashes
        run: |
          sha256sum dist/* > SHA256SUMS
          sha256sum --check SHA256SUMS

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Publish tagged GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip build
      - name: Require tag to match package version
        run: |
          PROJECT_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          python -c 'import re, sys; sys.exit(0 if re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+", sys.argv[1]) else 1)' "$PROJECT_VERSION"
          EXPECTED_TAG="v$PROJECT_VERSION"
          test "$GITHUB_REF_NAME" = "$EXPECTED_TAG"
          echo "ABFE_EXPECTED_VERSION=$PROJECT_VERSION" >> "$GITHUB_ENV"
      - run: python -m build
      - run: python scripts/check_artifacts.py dist/*.whl dist/*.tar.gz
      - name: Wheel installed-package smoke test
        run: |
          python -m venv /tmp/abfe-release-wheel-smoke
          /tmp/abfe-release-wheel-smoke/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/abfe-release-wheel-smoke/bin/python "$GITHUB_WORKSPACE/scripts/smoke_installed.py" --expected-version "$ABFE_EXPECTED_VERSION"
      - name: Source-distribution installed-package smoke test
        run: |
          python -m venv /tmp/abfe-release-sdist-smoke
          /tmp/abfe-release-sdist-smoke/bin/python -m pip install "$GITHUB_WORKSPACE"/dist/*.tar.gz
          cd /tmp
          /tmp/abfe-release-sdist-smoke/bin/python "$GITHUB_WORKSPACE/scripts/smoke_installed.py" --expected-version "$ABFE_EXPECTED_VERSION"
      - name: Record artifact hashes
        run: sha256sum dist/* > SHA256SUMS
      - name: Publish immutable GitHub release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* SHA256SUMS --verify-tag --generate-notes
