name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Python ${{ matrix.python }} / ${{ matrix.dependencies }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.10"
            dependencies: floor
          - python: "3.13"
            dependencies: current
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - if: matrix.dependencies == 'floor'
        run: python -m pip install "numpy==1.24.4" "scipy==1.10.1"
      - run: python -m pytest -m "not reference"
      - run: python -m ruff check .
      - if: matrix.python == '3.10'
        run: python -m mypy --no-incremental --python-version 3.10
      - if: matrix.python == '3.13'
        run: python -m mypy --no-incremental --python-version 3.13
      - name: Reject tracked generated or workspace-only files
        run: |
          test -z "$(git ls-files \
            '.mypy_cache/**' '.pytest_cache/**' '.ruff_cache/**' \
            '**/__pycache__/**' '*.pyc' '*.pyo' '*.whl' '*.tar.gz' \
            'build/**' 'dist/**' '.venv/**' '.DS_Store' 'AGENTS.md' \
            '*Audit*Report*')"

  wheel:
    name: Build and inspect distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - name: Read expected package version
        run: |
          echo "ABFE_EXPECTED_VERSION=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')" >> "$GITHUB_ENV"
      - name: Validate wheel and source-distribution contents
        run: python scripts/check_artifacts.py dist/*.whl dist/*.tar.gz
      - name: Wheel installed-package smoke test
        run: |
          python -m venv /tmp/abfe-wheel-smoke
          /tmp/abfe-wheel-smoke/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/abfe-wheel-smoke/bin/python "$GITHUB_WORKSPACE/scripts/smoke_installed.py" --expected-version "$ABFE_EXPECTED_VERSION"
      - name: Source-distribution installed-package smoke test
        run: |
          python -m venv /tmp/abfe-sdist-smoke
          /tmp/abfe-sdist-smoke/bin/python -m pip install dist/*.tar.gz
          cd /tmp
          /tmp/abfe-sdist-smoke/bin/python "$GITHUB_WORKSPACE/scripts/smoke_installed.py" --expected-version "$ABFE_EXPECTED_VERSION"

  reference-validation:
    name: Pinned external numerical references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]" "antropy==0.2.2" "mne==1.12.1" "nolds==0.6.2"
      - name: Install pinned sampen-profile authority
        run: python -m pip install "git+https://github.com/shivapratap/sampen-profile.git@263b72f7b906208241291c0579e8ec103fb52d79"
      - name: Install pinned DIHC comparison reference
        run: python -m pip install "git+https://github.com/shivapratap/dihc-feature-manager.git@852a79d0178eb762aeaf81960820043365a059c3"
      - run: python -m pytest -m reference
        env:
          ABFE_RUN_REFERENCE: "1"
